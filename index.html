<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2026 최신동향 리포트</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="shell">
      <section class="hero">
        <p class="eyebrow">Local-only privacy shield</p>
        <h1>2026 최신동향</h1>
        <p class="lead">웹캠 프레임 변화만 로컬에서 감지해서, 누군가 지나가면 업무용 리포트 화면으로 자동 전환합니다. 서버 업로드 없음.</p>
        <div class="hero-actions">
          <button id="startButton" class="primary">보호 시작</button>
          <button id="demoButton" class="ghost">비상 전환 테스트</button>
          <button id="restoreButton" class="ghost hidden">원래 화면 복귀</button>
        </div>
        <p id="status" class="status">대기 중 · 카메라 접근 전</p>
      </section>

      <section class="controls" aria-label="설정">
        <label>
          위장 페이지
          <select id="coverSelect">
            <option value="trend">2026 AI 산업 최신동향</option>
            <option value="sheet">분기별 업무 KPI 시트</option>
            <option value="meeting">전략회의 회의록</option>
            <option value="docs">구글문서풍 검토문서</option>
            <option value="spreadsheet">스프레드시트 KPI</option>
            <option value="code">코드 에디터</option>
          </select>
        </label>
        <label>
          팀장 감도
          <input id="sensitivity" type="range" min="6" max="32" value="16" />
          <span id="sensitivityLabel">보통 사무실 모드</span>
        </label>
        <label>
          감지 영역
          <select id="roiSelect">
            <option value="full">전체 화면</option>
            <option value="left">왼쪽 복도</option>
            <option value="right">오른쪽 복도</option>
            <option value="back">상단/뒤쪽 배경</option>
          </select>
        </label>
        <label>
          자동 복귀
          <input id="autoRestore" type="checkbox" checked />
          접근자 사라진 뒤 5초 후 복귀
        </label>
      </section>

      <section class="monitor-card" aria-label="카메라 모니터">
        <div class="camera-wrap">
          <video id="video" playsinline muted></video>
          <canvas id="motionCanvas" width="160" height="90" aria-hidden="true"></canvas>
          <div id="motionBadge" class="badge">감지 대기</div>
          <div class="score-panel" aria-live="polite">
            <strong id="scoreLabel">안전</strong>
            <span id="scoreDetail">점수 0% · 기준 16%</span>
          </div>
        </div>
        <div class="notes">
          <h2>안전한 구현 범위</h2>
          <ul>
            <li>얼굴 인식/저장 없음</li>
            <li>서버 업로드 없음</li>
            <li>프레임 차이량만 계산</li>
            <li>단축키: <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>L</kbd></li>
          </ul>
        </div>
      </section>
    </main>

    <section id="cover" class="cover hidden" aria-live="polite">
      <div class="cover-topbar">
        <span>Confidential Workstream / 2026</span>
        <button id="coverExit" title="Ctrl+Shift+L">복귀</button>
      </div>
      <div id="coverContent" class="cover-content"></div>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
